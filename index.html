<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#14141f;--surface-hover:#1c1c2e;
  --text:#e8e6e1;--text-muted:#8a8690;--text-dim:#5a5660;
  --accent:#c9a96e;--accent-dim:#8a7548;
  --border:rgba(201,169,110,0.15);--border-strong:rgba(201,169,110,0.3);
  --fd:'Playfair Display',Georgia,serif;
  --fb:'Source Sans 3','Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);height:100vh;overflow:hidden}

#topbar{
  position:fixed;top:0;left:0;right:0;z-index:2000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:56px;
  background:rgba(10,10,15,0.97);border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-family:var(--fd);font-size:20px;font-weight:400;color:var(--accent)}
.brand span{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}

.tabs{display:flex;gap:2px;background:var(--surface);border-radius:6px;padding:3px;border:1px solid var(--border)}
.tab{
  padding:6px 20px;border-radius:4px;font-size:13px;font-family:var(--fb);
  color:var(--text-muted);background:transparent;border:none;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.3px;
}
.tab:hover{color:var(--text)}
.tab.active{background:rgba(201,169,110,0.12);color:var(--accent)}

.view{display:none;position:absolute;top:56px;left:0;right:0;bottom:0}
.view.active{display:block}

/* ===== MAP VIEW ===== */
#mapView{overflow:hidden}
#map{height:100%;width:100%}
.leaflet-container{background:#0a0a0f}

.map-controls{
  position:absolute;top:12px;left:12px;right:12px;z-index:1000;
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  pointer-events:none;
}
.map-controls>*{pointer-events:auto}

select{
  background:var(--surface);color:var(--text);border:1px solid var(--border);
  padding:6px 28px 6px 10px;border-radius:4px;font-family:var(--fb);font-size:12px;
  cursor:pointer;appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238a8690' fill='none' stroke-width='1.5'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 8px center;
}
select:hover{border-color:var(--accent-dim)}
select:focus{outline:none;border-color:var(--accent)}

.map-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.pill{background:var(--surface);border:1px solid var(--border);padding:5px 14px;border-radius:20px;font-size:12px;color:var(--text-muted)}
.pill strong{color:var(--accent);font-weight:600}

.legend{
  position:absolute;bottom:24px;left:12px;z-index:1000;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;
}
.legend-title{color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-size:10px}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px}
.legend-item{display:flex;align-items:center;gap:5px;cursor:pointer;padding:2px 0;font-size:11px}
.legend-item:hover{opacity:0.7}
.legend-dot{width:7px;height:7px;border-radius:50%}

.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:8px!important;box-shadow:0 12px 40px rgba(0,0,0,0.6)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;font-family:var(--fb)!important;color:var(--text)!important;width:300px!important;max-width:300px!important}
.leaflet-popup-tip{background:var(--surface)!important;border:1px solid var(--border)!important;box-shadow:none!important}
.leaflet-popup-close-button{color:var(--text-muted)!important;font-size:18px!important;padding:6px 8px 0 0!important}
.leaflet-popup-close-button:hover{color:var(--accent)!important}
.leaflet-control-zoom{border:1px solid var(--border)!important}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text-muted)!important;border-bottom:1px solid var(--border)!important}
.leaflet-control-zoom a:hover{background:var(--surface-hover)!important;color:var(--accent)!important}

.pc{padding:16px 18px}
.pc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pc-ep{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600}
.pc-mood{font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:10px;font-weight:600}
.pc-loc{font-family:var(--fd);font-size:17px;margin-bottom:3px}
.pc-ti{font-size:11px;color:var(--text-muted);margin-bottom:10px}
.pc-div{height:1px;background:var(--border);margin:0 -18px 10px}
.pc-q{font-family:var(--fd);font-style:italic;font-size:13px;line-height:1.65;color:#d4d0c8;max-height:160px;overflow-y:auto;padding-right:4px}
.pc-q::-webkit-scrollbar{width:3px}
.pc-q::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:3px}
.pc-ctx{font-size:10px;color:var(--text-muted);margin-top:10px;font-style:italic;line-height:1.4}
.pc-th{font-size:10px;color:var(--accent-dim);margin-top:4px}

/* ===== TIMELINE VIEW ===== */
#timelineView{overflow-y:auto}
.tl-bar{display:flex;gap:6px;padding:12px 32px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;position:sticky;top:0;background:rgba(10,10,15,0.97);z-index:100;backdrop-filter:blur(8px)}
.tl-bar span{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-right:6px}
.era-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--text-muted);
  padding:4px 12px;border-radius:16px;font-size:11px;font-family:var(--fb);cursor:pointer;transition:all 0.2s;
}
.era-btn:hover{border-color:var(--accent-dim);color:var(--text)}
.era-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,0.08)}
.era-cnt{font-size:9px;opacity:0.6;margin-left:3px}

.tl-stats{display:flex;gap:20px;padding:10px 32px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tl-stat{font-size:12px;color:var(--text-muted)}
.tl-stat strong{color:var(--accent);font-weight:600}

.tl-content{padding:32px 32px 60px;position:relative}
.tl-line{position:absolute;left:52px;top:0;bottom:0;width:1px;background:var(--border)}

.dec-marker{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--text-dim);margin:40px 0 20px 64px;padding:6px 0;border-top:1px solid var(--border)}
.dec-marker:first-child{margin-top:0}

.yr-group{position:relative;padding-left:64px;margin-bottom:40px;opacity:0;transform:translateY(10px);animation:fadeUp 0.35s forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.yr-dot{position:absolute;left:48px;top:8px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);z-index:1}
.yr-label{font-family:var(--fd);font-size:28px;color:var(--accent);margin-bottom:12px}

.ac{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px 20px;margin-bottom:10px;max-width:680px;
  transition:border-color 0.2s,transform 0.15s;cursor:pointer;
}
.ac:hover{border-color:var(--accent-dim);transform:translateX(3px)}
.ac.expanded{border-color:var(--accent)}
.ac-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ac-ep{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600}
.ac-ti{font-size:10px;color:var(--text-dim)}
.ac-m{font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:auto}
.ac-q{font-family:var(--fd);font-style:italic;font-size:14px;line-height:1.65;color:#d4d0c8;max-height:66px;overflow:hidden;transition:max-height 0.4s}
.ac.expanded .ac-q{max-height:500px}
.ac-more{font-size:10px;color:var(--accent-dim);margin-top:6px;display:none}
.ac-loc{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:var(--text-muted);background:rgba(201,169,110,0.06);padding:2px 8px;border-radius:10px}
.ac-loc::before{content:'📍';font-size:9px}

.tl-empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:14px;font-style:italic}

.m-nos{background:rgba(201,169,110,0.2);color:#c9a96e}
.m-sar{background:rgba(130,140,160,0.25);color:#9aa0b0}
.m-mel{background:rgba(100,130,180,0.2);color:#7090c0}
.m-men{background:rgba(180,80,80,0.2);color:#c06060}
.m-hum{background:rgba(110,180,130,0.2);color:#70b080}
.m-cau{background:rgba(200,150,80,0.2);color:#c89850}
.m-wis{background:rgba(150,120,180,0.2);color:#a080c0}
.m-adm{background:rgba(180,140,180,0.2);color:#c0a0c0}

@media(max-width:640px){
  #topbar{padding:0 12px;height:48px}
  .brand h1{font-size:16px}
  .brand span{display:none}
  .tab{padding:5px 14px;font-size:12px}
  .map-controls{flex-direction:column;align-items:flex-start;gap:6px}
  .legend{bottom:10px;left:8px;padding:8px 10px}
  .tl-bar,.tl-stats,.tl-content{padding-left:14px;padding-right:14px}
  .tl-line{left:28px}
  .yr-group{padding-left:40px}
  .yr-dot{left:24px}
  .leaflet-popup-content{width:260px!important;max-width:260px!important}
}
</style>
</head>

<script>
const MC={nostalgic:'#c9a96e',sardonic:'#8a90a5',melancholic:'#6080b0',menacing:'#c05050',humorous:'#60a870',cautionary:'#c89840',wistful:'#9070b0',admiring:'#b890b8'};
const MM={nostalgic:'m-nos',sardonic:'m-sar',melancholic:'m-mel',menacing:'m-men',humorous:'m-hum',cautionary:'m-cau',wistful:'m-wis',admiring:'m-adm'};

const MAP_DATA=[[" A building collapses in moscow, a ferry capsizes on the brahmaputra river. These are the events we've come to expect on the evening news. But in truth, there's always more to the story.","Moscow",55.626,37.606,"S01E02",1,"The Freelancer (No. 145)","cautionary","Red is explaining the Freelancer's methods",null],["I remember two years ago - my late husband was in South Sudan. We saw a boy...","South Sudan",7.87,29.667,"S01E02",1,"The Freelancer (No. 145)","nostalgic","Red is identifying the freelancer at the charity event","two years ago"],["The gentleman I usually contract with is unavailable -- stung by a Manta Ray off the barrier reef in Belize.","Belize",17.12,-88.686,"S01E03",1,"Wujing (No. 84)","sardonic","Explaining why he needs a replacement tech",null],["I was taken by Somali pirates last March, spent three weeks in a shipping container. The first two were a nightmare. The third one was actually quite pleasant.","Somalia",5.152,46.2,"S01E03",1,"Wujing (No. 84)","sardonic","Explaining why he has a DARPA tracking chip","last March"],["I spent a month in silent meditation at a monastery just outside of Kunming.","Kunming",25.04,102.717,"S01E03",1,"Wujing (No. 84)","nostalgic","Making conversation with Jin Sun",null],["A few years ago, some of my associates encountered the Courier in an opium den in Cairo. He killed two of them.","Cairo",30.044,31.236,"S01E05",1,"The Courier (No. 85)","cautionary","Explaining how to locate the Courier","A few years ago"],["I died once in Marrakech... Two and a half minutes.","Marrakech",31.626,-7.989,"S01E05",1,"The Courier (No. 85)","wistful","Helping to revive Seth",null],["In 1982, seven people in Chicago were killed by an over-the-counter drug laced with potassium cyanide.","Chicago",41.876,-87.624,"S01E06",1,"Gina Zanetakos (No. 152)","menacing","Explaining corporate espionage","1982"],["I like Yuri. I floated in the Dead Sea with Yuri, climbed Masada with his wife.","Dead Sea",31.541,35.479,"S01E06",1,"Gina Zanetakos (No. 152)","nostalgic","Trying to get information from Ruddiger",null],["Mary, darling, you would thrive in Malaysia.","Malaysia",4.569,102.266,"S01E08",1,"General Ludd (No. 109)","nostalgic","Convincing a counterfeiter to relocate",null],["Years ago, I used to smuggle small shipments of oaxaca-highland gold into this airstrip.","Oaxaca, Mexico",17.073,-96.727,"S01E08",1,"General Ludd (No. 109)","nostalgic","Confronting Wolff at an airstrip","Years ago"],["I want to be in the Piazza del Campo in Siena, to feel the surge as 10 racehorses go thundering by.","Piazza del Campo",43.318,11.332,"S01E09",1,"Anslo Garrick (No. 16)","wistful","Trapped with Ressler, reflecting on mortality","when I was a boy"],["I once saw him kill a Somali with a wire hanger.","Somalia",5.152,46.2,"S01E10",1,"Anslo Garrick: Conclusion","menacing","Garrick speaking about Red",null],["Didn't you spend four months in Phonthong? Seven.","Phonthong",20.815,103.096,"S01E12",1,"The Alchemist (No. 101)","sardonic","Discussing survival strategies",null],["You remind me of this woman I knew in Lisbon.","Lisbon",38.708,-9.137,"S01E13",1,"The Cyprus Agency (No. 64)","menacing","Threatening Diane",null],["I was 17. There was a drugstore. Thursday night.","Omaha",41.259,-95.938,"S01E14",1,"Madeline Pratt (No. 73)","melancholic","Madeline's criminal past","I was 17"],["I ran out of gas. It was Christmas Eve. More than 20 years ago. And there was just blood.","Florence",43.77,11.256,"S01E14",1,"Madeline Pratt (No. 73)","melancholic","Why he didn't show up in Florence","more than 20 years ago"],["If I was able to find you hiding on that sheep farm outside of Dingle, I can find this girl.","Dingle, Ireland",52.141,-10.267,"S01E15",1,"The Judge (No. 57)","menacing","Threatening someone",null],["I had a water pump go out in Pagosa Springs.","Pagosa Springs",37.27,-107.011,"S01E19",1,"The Pavlovich Brothers","nostalgic","Questioning Geoffrey Seevers",null],["It was the shoes. That's when I knew.","Halstead",51.945,0.643,"S01E19",1,"The Pavlovich Brothers","melancholic","Tom confessing to Liz",null],["I met Dr. Sanders through a mutual friend. We spent a glorious weekend in God's country.","Liechtenstein",47.142,9.553,"S01E21",1,"Berlin (No. 8)","nostalgic","Reminiscing with Dr. Sanders","Dec 2010"],["I was once on the island of Ko Ri, free-diving in the Andaman Sea.","Ko Ri",9.476,97.904,"S01E21",1,"Berlin (No. 8)","nostalgic","Speaking to Liz during a standoff",null],["I once found a hedge-fund manager hiding in the Amazon on the banks of the Kuluene River.","Kuluene River, Brazil",-12.1,-53.3,"S01E22",1,"Berlin: Conclusion","menacing","Threatening Berlin",null],["He spoke of Beirut 2010, the Campolongo incident.","Beirut",33.889,35.503,"S01E22",1,"Berlin: Conclusion","sardonic","Explaining who Berlin really was","2010"],["Please don't tell me this is about that dust-up in Haifa.","Haifa",32.819,34.998,"S02E01",2,"Lord Baltimore (No. 104)","sardonic","Being confronted by someone",null],["I tried to curb my cravings in this little shop in the West Village.","West Village, NYC",40.734,-74.003,"S02E02",2,"Monarch Douglas Bank","humorous","Discussing Paczki pastries",null],["I almost gave up looking for you. You were like a ghost for 12 years.","Barcelona",41.383,2.177,"S02E02",2,"Monarch Douglas Bank","menacing","Berlin explaining his hunt","12 years"],["Remember the time we made barley stew with that coroner from Des Moines?","Des Moines",41.587,-93.625,"S02E03",2,"Dr. James Covington","nostalgic","Reminiscing with Mr. Kaplan",null],["I once shared a ride on a twin-engine prop from Port-Au-Prince.","Port-Au-Prince",18.547,-72.34,"S02E03",2,"Dr. James Covington","humorous","Explaining his knowledge of Babbitt",null],["When I was 15, I had a summer job installing carpets on Lake Charlevoix.","Lake Charlevoix",45.238,-85.075,"S02E03",2,"Dr. James Covington","nostalgic","Revealing why he values loyalty","when I was 15"],["I never send anyone I care about to Solvang. // ===== VIEW SWITCHING =====
let mapInit=false;
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name+'View').classList.add('active');
  document.querySelector(`.tab[onclick="showView('${name}')"]`).classList.add('active');
  if(name==='map'&&!mapInit){initMap();mapInit=true}
  else if(name==='map'&&mapInit){map.invalidateSize()}
}

// ===== MAP =====
let map,markers=[];
function initMap(){
  map=L.map('map',{center:[30,15],zoom:3,zoomControl:true,attributionControl:false,minZoom:2,maxZoom:16});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(map);
  L.control.attribution({prefix:false,position:'bottomright'}).addAttribution('© <a href="https://carto.com/" style="color:#666">CARTO</a>').addTo(map);

  for(let s=1;s<=10;s++){const o=document.createElement('option');o.value=s;o.textContent='S'+s;document.getElementById('sf').appendChild(o)}
  Object.keys(MC).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m[0].toUpperCase()+m.slice(1);document.getElementById('mf').appendChild(o)});

  const lg=document.getElementById('lg');
  Object.entries(MC).forEach(([m,c])=>{
    const el=document.createElement('div');el.className='legend-item';
    el.innerHTML=`<div class="legend-dot" style="background:${c}"></div><span style="color:${c}">${m}</span>`;
    el.onclick=()=>{const mf=document.getElementById('mf');mf.value=mf.value===m?'all':m;applyMapFilters()};
    lg.appendChild(el);
  });

  document.getElementById('sf').addEventListener('change',applyMapFilters);
  document.getElementById('mf').addEventListener('change',applyMapFilters);
  renderMap(D);
}

function mkIcon(mood){
  const c=MC[mood]||'#888';
  return L.divIcon({className:'',iconSize:[10,10],iconAnchor:[5,5],
    html:`<div style="position:relative"><div style="position:absolute;top:-4px;left:-4px;width:18px;height:18px;border-radius:50%;background:${c};opacity:0.15"></div><div style="width:10px;height:10px;border-radius:50%;background:${c};border:2px solid rgba(255,255,255,0.3);cursor:pointer;position:relative;z-index:1"></div></div>`});
}

function mkPopup(d){
  const th=d.hint?`<div class="pc-th">⏱ ${d.hint}</div>`:'';
  return `<div class="pc"><div class="pc-meta"><span class="pc-ep">${d.episode}</span><span class="pc-mood ${MM[d.mood]||''}">${d.mood}</span></div><div class="pc-loc">${d.location}</div><div class="pc-ti">${d.title}</div><div class="pc-div"></div><div class="pc-q">"${d.text.replace(/"/g,'')}"</div><div class="pc-ctx">${d.context||''}</div>${th}</div>`;
}

function renderMap(data){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  const groups={};
  data.forEach(d=>{const k=`${d.lat.toFixed(2)},${d.lon.toFixed(2)}`;if(!groups[k])groups[k]=[];groups[k].push(d)});
  Object.values(groups).forEach(g=>{
    const os=0.008;
    g.forEach((d,i)=>{
      const la=g.length>1?d.lat+(i-(g.length-1)/2)*os:d.lat;
      const lo=g.length>1?d.lon+(i-(g.length-1)/2)*os*0.7:d.lon;
      const m=L.marker([la,lo],{icon:mkIcon(d.mood)}).bindPopup(mkPopup(d),{maxWidth:320,closeButton:true,autoPan:true}).addTo(map);
      markers.push(m);
    });
  });
  document.getElementById('cnt').innerHTML=`<strong>${data.length}</strong> anecdotes`;
}

function applyMapFilters(){
  const s=document.getElementById('sf').value;
  const m=document.getElementById('mf').value;
  let f=D;
  if(s!=='all')f=f.filter(d=>d.season===parseInt(s));
  if(m!=='all')f=f.filter(d=>d.mood===m);
  renderMap(f);
}

// ===== TIMELINE =====
let tlInit=false;
function initTimeline(){
  if(tlInit)return;tlInit=true;
  const nav=document.getElementById('eraNav');
  const allBtn=document.createElement('button');
  allBtn.className='era-btn active';
  allBtn.innerHTML=`All<span class="era-cnt">(${TL.length})</span>`;
  allBtn.onclick=()=>{document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('active'));allBtn.classList.add('active');renderTimeline(null)};
  nav.appendChild(allBtn);

  ERAS.forEach(era=>{
    const cnt=TL.filter(d=>d.year>=era.range[0]&&d.year<=era.range[1]).length;
    if(!cnt)return;
    const btn=document.createElement('button');btn.className='era-btn';
    btn.innerHTML=`${era.label}<span class="era-cnt">(${cnt})</span>`;
    btn.onclick=()=>{document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTimeline(era)};
    nav.appendChild(btn);
  });

  renderTimeline(null);
}

function renderTimeline(era){
  const c=document.getElementById('tlContent');
  c.innerHTML='<div class="tl-line"></div>';
  let data=TL;
  if(era)data=TL.filter(d=>d.year>=era.range[0]&&d.year<=era.range[1]);
  if(!data.length){c.innerHTML='<div class="tl-empty">No anecdotes in this era.</div>';return}

  const grouped={};data.forEach(d=>{if(!grouped[d.year])grouped[d.year]=[];grouped[d.year].push(d)});
  const years=Object.keys(grouped).map(Number).sort((a,b)=>a-b);
  const withLoc=data.filter(d=>d.location).length;

  document.getElementById('tlStats').innerHTML=`
    <span class="tl-stat"><strong>${data.length}</strong> anecdotes</span>
    <span class="tl-stat"><strong>${years[0]}–${years[years.length-1]}</strong> span</span>
    <span class="tl-stat"><strong>${withLoc}</strong> with location</span>`;

  let lastDec=0,delay=0;
  years.forEach(year=>{
    const dec=Math.floor(year/10)*10;
    if(dec!==lastDec){
      const dm=document.createElement('div');dm.className='dec-marker';
      const eraInfo=ERAS.find(e=>year>=e.range[0]&&year<=e.range[1]);
      dm.textContent=`${dec}s`+(eraInfo?` — ${eraInfo.label}`:'');
      c.appendChild(dm);lastDec=dec;
    }

    const yg=document.createElement('div');yg.className='yr-group';yg.style.animationDelay=`${delay*50}ms`;delay++;
    yg.innerHTML=`<div class="yr-dot"></div><div class="yr-label">${year}</div>`;

    grouped[year].forEach(d=>{
      const card=document.createElement('div');card.className='ac';
      const locH=d.location?`<div class="ac-loc">${d.location}</div>`:'';
      card.innerHTML=`<div class="ac-hdr"><span class="ac-ep">${d.episode}</span><span class="ac-ti">${d.title}</span><span class="ac-m ${MM[d.mood]||''}">${d.mood}</span></div><div class="ac-q">"${d.text.replace(/"/g,'')}"</div><div class="ac-more">Read more</div>${locH}`;
      card.onclick=()=>card.classList.toggle('expanded');
      setTimeout(()=>{const q=card.querySelector('.ac-q');if(q.scrollHeight>70)card.querySelector('.ac-more').style.display='block'},100);
      yg.appendChild(card);
    });
    c.appendChild(yg);
  });
}

// Init
initMap();
initTimeline();
